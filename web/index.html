<!DOCTYPE html>
<!-- SPDX-License-Identifier: AGPL-3.0-or-later -->
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lodester</title>
  <style>
    :root {
      --bg: #f8f9fa;
      --card: #ffffff;
      --border: #dee2e6;
      --primary: #0d6efd;
      --danger: #dc3545;
      --success: #198754;
      --text: #212529;
      --muted: #6c757d;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      width: 100%;
      padding: 1rem;
      text-align: center;
      border-bottom: 1px solid var(--border);
      background: var(--card);
    }
    header h1 { font-size: 1.5rem; }
    header p { color: var(--muted); font-size: 0.85rem; margin-top: 0.25rem; }
    main {
      width: 100%;
      max-width: 420px;
      padding: 1.5rem 1rem;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .card h2 { font-size: 1.1rem; margin-bottom: 1rem; }
    .field { margin-bottom: 0.75rem; }
    .field label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    .field input {
      width: 100%;
      padding: 0.5rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 0.95rem;
    }
    button {
      width: 100%;
      padding: 0.6rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 0.95rem;
      cursor: pointer;
      margin-top: 0.5rem;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    button:hover:not(:disabled) { filter: brightness(0.9); }
    .btn-danger { background: var(--danger); }
    .msg {
      margin-top: 0.5rem;
      padding: 0.5rem;
      border-radius: 4px;
      font-size: 0.85rem;
      display: none;
    }
    .msg.error { display: block; background: #f8d7da; color: var(--danger); }
    .msg.success { display: block; background: #d1e7dd; color: var(--success); }
    .msg.info { display: block; background: #cff4fc; color: #055160; }
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 1rem;
    }
    .tabs button {
      flex: 1;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      margin: 0;
      border-radius: 0;
      font-weight: 600;
    }
    .tabs button:first-child { border-radius: 4px 0 0 4px; }
    .tabs button:last-child { border-radius: 0 4px 4px 0; }
    .tabs button.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .hidden { display: none !important; }
    #session-info {
      font-size: 0.85rem;
      word-break: break-all;
    }
    #session-info dt { font-weight: 600; margin-top: 0.5rem; }
    #session-info dd { color: var(--muted); }
    footer {
      margin-top: auto;
      padding: 1rem;
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <header>
    <h1>Lodester</h1>
    <p>Open Address Protocol</p>
  </header>

  <main>
    <!-- Auth section (visible when logged out) -->
    <div id="auth-section">
      <div class="tabs">
        <button id="tab-login" class="active" onclick="showTab('login')">ログイン</button>
        <button id="tab-register" onclick="showTab('register')">アカウント作成</button>
      </div>

      <!-- Login form -->
      <div id="form-login" class="card">
        <h2>ログイン</h2>
        <form onsubmit="handleLogin(event)">
          <div class="field">
            <label for="login-email">メールアドレス</label>
            <input type="email" id="login-email" required autocomplete="email">
          </div>
          <div class="field">
            <label for="login-password">マスターパスワード</label>
            <input type="password" id="login-password" required autocomplete="current-password">
          </div>
          <button type="submit" id="login-btn">ログイン</button>
          <div id="login-msg" class="msg"></div>
        </form>
      </div>

      <!-- Register form -->
      <div id="form-register" class="card hidden">
        <h2>アカウント作成</h2>
        <form onsubmit="handleRegister(event)">
          <div class="field">
            <label for="reg-email">メールアドレス</label>
            <input type="email" id="reg-email" required autocomplete="email">
          </div>
          <div class="field">
            <label for="reg-password">マスターパスワード</label>
            <input type="password" id="reg-password" required autocomplete="new-password" minlength="8">
          </div>
          <div class="field">
            <label for="reg-password-confirm">マスターパスワード (確認)</label>
            <input type="password" id="reg-password-confirm" required autocomplete="new-password" minlength="8">
          </div>
          <button type="submit" id="reg-btn">アカウント作成</button>
          <div id="reg-msg" class="msg"></div>
        </form>
      </div>
    </div>

    <!-- Dashboard section (visible when logged in) -->
    <div id="dashboard-section" class="hidden">
      <div class="card">
        <h2>ダッシュボード</h2>
        <dl id="session-info">
          <dt>ユーザー ID</dt>
          <dd id="dash-user-id">-</dd>
          <dt>メールアドレス</dt>
          <dd id="dash-email">-</dd>
        </dl>
        <button class="btn-danger" onclick="handleLogout()">ログアウト</button>
      </div>

      <!-- Vault section -->
      <div id="vault-section" class="card">
        <h2>ボールト</h2>
        <div class="field">
          <label for="vault-data">データ (JSON)</label>
          <textarea id="vault-data" rows="8" style="width:100%;padding:0.5rem;border:1px solid var(--border);border-radius:4px;font-family:monospace;font-size:0.85rem;resize:vertical;" placeholder='{"addresses": []}'></textarea>
        </div>
        <button id="vault-save-btn" onclick="handleSaveVault()">保存</button>
        <button style="background:var(--muted);margin-top:0.25rem;" onclick="loadVault()">再読込</button>
        <div id="vault-msg" class="msg"></div>
      </div>
    </div>
  </main>

  <footer>
    Lodester &mdash; AGPL v3 &mdash; Open Address Protocol
  </footer>

  <script src="/static/lodester-client.js"></script>
</body>
</html>
