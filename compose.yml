services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: lodester_dev
      POSTGRES_USER: lodester
      POSTGRES_PASSWORD: dev_password_change_me
    ports:
      - "5432:5432"
    volumes:
      - lodester_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lodester"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  lodester_db_data:
